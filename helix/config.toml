# theme = "catppuccin_mocha"
# theme = "base16_transparent"
theme = "everforest_dark_hc"
# theme = "everforest_dark"

[editor]
line-number = "relative"
true-color = true
color-modes = true
end-of-line-diagnostics = "hint"
bufferline = "multiple"

[editor.statusline]
left = ["mode", "spinner", "version-control", "spacer", "separator", "file-name", "read-only-indicator", "file-modification-indicator"]

[editor.cursor-shape]
normal = "block"

[editor.indent-guides]
render = true

[editor.inline-diagnostics]
cursor-line = "warning"
other-lines = "disable"

[editor.soft-wrap]
enable = true

[keys.normal.space.i]
c = ":toggle inline-diagnostics.cursor-line hint disable"
o = ":toggle inline-diagnostics.other-lines hint disable"

[keys.normal.space]
o = ":echo %sh{git blame -L %{cursor_line},+1 %{buffer_name}}"

[keys.normal]
X = ["extend_line_up", "extend_to_line_bounds"]

[keys.normal.m]
f = "@maf<A-;>;"
F = "@maf;"
w = "@miw*"
